<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rekap Data Uploader</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="container">
        <h1>📊 Upload Data Rekap</h1>
        <p>Upload file Excel/CSV → Otomatis ke Google Sheets</p>
        
        <form id="uploadForm">
            <div class="form-group">
                <label>📁 Pilih File (.xlsx, .csv, .xls)</label>
                <input type="file" id="fileInput" accept=".xlsx,.csv,.xls" required>
            </div>
            
            <div class="form-group">
                <label>📝 Mode Upload</label>
                <select id="mode">
                    <option value="new">Buat Spreadsheet BARU</option>
                    <option value="existing">Tambahkan ke Spreadsheet EXISTING</option>
                </select>
            </div>
            
            <div class="form-group" id="existingSheetGroup" style="display:none;">
                <label>🔗 Spreadsheet ID (contoh: 1ABC123xyz)</label>
                <input type="text" id="spreadsheetId" placeholder="Masukkan ID Google Sheets">
            </div>
            
            <div class="form-group">
                <label>📄 Nama Sheet (opsional)</label>
                <input type="text" id="sheetName" placeholder="Kosongkan = pakai nama dari file">
            </div>
            
            <button type="submit" id="submitBtn">🚀 Upload & Proses</button>
        </form>
        
        <div id="result" style="display:none;">
            <h3>✅ Hasil Upload</h3>
            <p id="resultMessage"></p>
            <a id="resultLink" href="#" target="_blank">🔗 Buka Google Sheets</a>
        </div>
        
        <div id="loading" style="display:none;">
            <div class="spinner"></div>
            <p>Memproses data, mohon tunggu...</p>
        </div>
    </div>
    
    <script src="/script.js"></script>
</body>
</html>
