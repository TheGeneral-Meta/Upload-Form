<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rekap Data Uploader - Auto Google Sheets</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>📊 Rekap Data Uploader</h1>
        <p>Upload file Excel → Otomatis ke Google Sheets (tanpa setup coding)</p>
        
        <div class="step">
            <h3>🔑 Langkah 1: Masukkan Credentials Google Sheets</h3>
            <div class="form-group">
                <label>📄 Upload file JSON Service Account</label>
                <input type="file" id="jsonFileInput" accept=".json">
                <small>Dapatkan dari Google Cloud Console → Service Account → Keys</small>
            </div>
            
            <div class="form-group">
                <label>📧 Client Email</label>
                <input type="text" id="clientEmail" placeholder="auto terisi dari JSON" readonly>
            </div>
        </div>
        
        <div class="step">
            <h3>📁 Langkah 2: Upload Data Excel</h3>
            <div class="form-group">
                <label>📂 Pilih file (.xlsx, .csv, .xls)</label>
                <input type="file" id="excelFileInput" accept=".xlsx,.csv,.xls">
            </div>
            
            <div class="form-group">
                <label>🔄 Mode Upload</label>
                <select id="mode">
                    <option value="new">Buat Spreadsheet BARU</option>
                    <option value="existing">Tambahkan ke Spreadsheet EXISTING</option>
                </select>
            </div>
            
            <div class="form-group" id="existingSheetGroup" style="display:none;">
                <label>🔗 Spreadsheet ID (contoh: 1ABC123xyz)</label>
                <input type="text" id="spreadsheetId" placeholder="Masukkan ID Google Sheets">
            </div>
        </div>
        
        <button id="uploadBtn" disabled>🚀 Upload ke Google Sheets</button>
        
        <div id="loading" style="display:none;">
            <div class="spinner"></div>
            <p>Memproses data, mohon tunggu...</p>
        </div>
        
        <div id="result" style="display:none;">
            <h3>✅ Berhasil!</h3>
            <p id="resultMessage"></p>
            <a id="resultLink" href="#" target="_blank">🔗 Buka Google Sheets</a>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
